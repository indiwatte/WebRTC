<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC</title>
    <style>
        video {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <h1>Receiver</h1>
    <video id="otherCamera" playsinline autoplay muted></video>
    <script src="https://172.30.139.6:443/socket.io/socket.io.js"></script>
    <script type="module">

        // STEP 1: Get the video element where we'll show the OTHER PERSON's camera
        const $otherCamera = document.getElementById('otherCamera');

        // STEP 2: Create variables we'll need
        let socket;  // The "phone line" to the server
        let peerConnection;  // The direct connection to the other person

        // STEP 3: Server info to help us connect (same as sender)
        // This Google server helps us figure out our internet address
        const servers = {
            iceServers: [{
                urls: `stun:stun.l.google.com:19302`
            }]
        };

        // STEP 4: Start everything when the page loads
        const init = async () => {
            initSocket();  // Connect to the server and wait for someone to call us
        };

        // STEP 5: Connect to the server and wait for incoming calls
        const initSocket = () => {
            // Connect to the PROJECTION server
            socket = io.connect('https://172.30.139.6:443');

            // When we connect, show our ID (like getting a phone number)
            socket.on(`connect`, () => {
                console.log(socket.id);
            });

            // When someone wants to call us (we get their "offer")
            // This is like our phone ringing!
            socket.on('peerOffer', (myId, offer, peerId) => {
                console.log(`Received peerOffer from ${peerId}`);
                answerPeerOffer(myId, offer, peerId);  // Answer the call!
            });

            // When we get "GPS directions" from the caller
            socket.on('peerIce', async (myId, candidate, peerId) => {
                console.log(`Received peerIce from ${peerId}`, candidate);
                await handlePeerIce(myId, candidate, peerId);  // Save these directions
            });
        };

        // STEP 6: Answer the incoming call!
        const answerPeerOffer = async (myId, offer, peerId) => {
            // Create a connection line to the caller
            peerConnection = new RTCPeerConnection(servers);

            // Set up: when we get "directions" to reach the caller, send them back through the server
            peerConnection.onicecandidate = (e) => {
                console.log('ice candidate', e.candidate);
                socket.emit('peerIce', peerId, e.candidate);  // Send our route info back to them
            };

            // IMPORTANT: When video/audio arrives from the caller, show it on screen!
            // This is like when the video call actually starts showing their face
            peerConnection.ontrack = (e) => {
                console.log('ontrack');  // "Hey! Video is coming in!"
                $otherCamera.srcObject = e.streams[0];  // Put their video in the video tag
            };

            // Process their offer (their side of the connection info)
            await peerConnection.setRemoteDescription(offer);

            // Create our answer - like saying "Yes! I got your call info, here's mine"
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);  // Save our side
            socket.emit(`peerAnswer`, peerId, answer);  // Send our answer back to them
        };

        // STEP 7: Save the route information from the caller
        const handlePeerIce = async (myId, candidate, peerId) => {
            if (!candidate) {
                return;  // If empty, skip it
            }
            await peerConnection.addIceCandidate(candidate);  // Save this possible route to connect
        };

        $otherCamera.addEventListener('click', () => {
            $otherCamera.play();
        });

        init();

    </script>
</body>

</html>
