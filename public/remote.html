<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typewriter application</title>
    <link rel="stylesheet" href="https://use.typekit.net/njf0vdi.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: linear-gradient(180deg, #f7f1ef 0%, #fef8fa 100%);
            font-family: "p22-typewriter", sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            color: #2c2220;
            background: rgba(255, 255, 255, 0.86);
            border: 2px solid #2c2220;
            border-radius: 22px;
            padding: 24px;
            box-shadow: 0 24px 70px rgba(44, 34, 32, 0.12);
        }

        h1 {
            margin-bottom: 20px;

            font-weight: 400;
            font-style: normal;
        }

        #status {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 999px;
            background: #fff7f9;
            border: 1px solid #2c2220;
            font-family: "p22-typewriter", sans-serif;
        }

        #status.connected {
            background: #d4edda;
            color: #155724;
        }

        .ink-color-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .color-ball {
            width: 20px;
            height: 20px;
            background-color: black;
            border-radius: 50%;
            border: 2px solid #333;
        }

        .sticker-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .heart-icon {
            width: 100px;
            height: 100px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .heart-icon:active {
            transform: scale(1.2);
        }

        .typing-surface {
            margin-top: 10px;
            border: 2px dashed #2c2220;
            border-radius: 14px;
            padding: 22px 16px;
            background: #fff;
            cursor: text;
        }

        .typing-surface p {
            margin: 0;
            line-height: 1.5;
        }

        .line-guide {
            margin-top: 10px;
            min-height: 1.4em;
            color: #5f4f4a;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .line-guide.active {
            color: #8d1a1a;
        }

        .typing-caret {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #2c2220;
            vertical-align: -0.15em;
            margin-left: 3px;
            animation: blink 1s step-end infinite;
        }

        #letterInput {
            position: fixed;
            left: -9999px;
            top: auto;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Type your letter here</h1>
        <div id="status">Connecting...</div>
        <div class="ink-color-selector">
            <div>ink color</div>
            <div class="color-ball"></div>
        </div>
        <div class="sticker-selector">
            <div>sticker</div>
            <img src="images/heart.png" alt="heart" class="heart-icon">
        </div>
        <div class="typing-surface" id="typingSurface" role="button" tabindex="0" aria-label="Tap here to type">
            <p>Tap here and start typing on your keyboard.</p>
            <p>Your text appears only on the desktop screen.<span class="typing-caret"></span></p>
        </div>
        <div class="line-guide" id="lineGuide">Swipe the carriage area to start a new line.</div>
        <textarea id="letterInput" autocomplete="off" autocorrect="off" autocapitalize="on"
            spellcheck="false"></textarea>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>

    <script>
        {
            const $letterInput = document.getElementById('letterInput');
            const $status = document.getElementById('status');
            const $typingSurface = document.getElementById('typingSurface');
            const $lineGuide = document.getElementById('lineGuide');

            let socket;
            let peer;
            let targetSocketId;
            let lastSentValue = '';
            let skipNextInputBell = false;
            let swipeStartX = 0;
            let swipeStartY = 0;
            let lineGuideTimeout;

            const MAX_CHARS_PER_LINE = 30;
            const SWIPE_THRESHOLD = 55;
            const SWIPE_VERTICAL_TOLERANCE = 45;

            // Get target socket ID from URL parameter
            const getUrlParameter = name => {
                name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
                const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
                const results = regex.exec(location.search);
                return results === null ? false : decodeURIComponent(results[1].replace(/\+/g, ' '));
            };

            const init = () => {
                targetSocketId = getUrlParameter('targetSocketId');

                if (!targetSocketId) {
                    $status.textContent = 'Error: No target ID provided in URL';
                    return;
                }

                console.log('Target Socket ID:', targetSocketId);
                $status.textContent = 'Connecting to desktop...';

                socket = io.connect('/');
                socket.on('connect', () => {
                    console.log(`Phone connected: ${socket.id}`);
                    $status.textContent = 'Creating connection...';

                    // We are the initiator - create offer
                    createPeer(true, targetSocketId);
                });

                // Listen for WebRTC signals from desktop
                socket.on('signal', (myId, signal, peerId) => {
                    console.log(`Received signal from ${peerId}`);

                    // Forward the signal to SimplePeer
                    if (peer) {
                        peer.signal(signal);
                    }
                });
            };

            const focusHiddenInput = () => {
                $letterInput.focus();
            };

            const getCurrentLineLength = value => {
                const lines = value.split('\n');
                return lines[lines.length - 1].length;
            };

            const exceedsLineLimit = value => {
                return value.split('\n').some(line => line.length > MAX_CHARS_PER_LINE);
            };

            const isCharacterInsertionKey = event => {
                return event.key.length === 1 && !event.metaKey && !event.ctrlKey && !event.altKey;
            };

            const showLineGuide = (message, isActive = true) => {
                clearTimeout(lineGuideTimeout);
                $lineGuide.textContent = message;
                $lineGuide.classList.toggle('active', isActive);

                if (isActive) {
                    lineGuideTimeout = setTimeout(() => {
                        $lineGuide.textContent = 'Swipe the carriage area to start a new line.';
                        $lineGuide.classList.remove('active');
                    }, 1800);
                }
            };

            const triggerCarriageReturn = () => {
                if ($letterInput.value.length === 0 || $letterInput.value.endsWith('\n')) {
                    return;
                }

                const nextValue = `${$letterInput.value}\n`;
                $letterInput.value = nextValue;
                skipNextInputBell = true;

                if (peer && peer.connected) {
                    peer.send('__BELL__');
                    peer.send(nextValue);
                }

                lastSentValue = nextValue;
                showLineGuide('Carriage returned. Keep typing.', false);
            };

            const createPeer = (initiator, peerId) => {
                console.log(`Creating peer connection (initiator: ${initiator})`);

                peer = new SimplePeer({
                    initiator,
                    trickle: false // Wait for all ICE candidates before sending offer/answer
                });

                // Send WebRTC signals through socket.io
                peer.on('signal', data => {
                    console.log('Sending signal');
                    socket.emit('signal', peerId, data);
                });

                // Connection established
                peer.on('connect', () => {
                    console.log('WebRTC connection established!');
                    $status.textContent = 'Connected to desktop!';
                    $status.classList.add('connected');
                    focusHiddenInput();
                });

                // Handle errors
                peer.on('error', err => {
                    console.error('Peer error:', err);
                    $status.textContent = 'Connection error: ' + err.message;
                });
            };

            // Send letter content on every keystroke through data channel
            $letterInput.addEventListener('input', (e) => {
                if (peer && peer.connected) {
                    const letterContent = e.target.value;

                    if (exceedsLineLimit(letterContent)) {
                        e.target.value = lastSentValue;
                        showLineGuide('Line full. Swipe the carriage to start a new line.');
                        return;
                    }

                    const insertedLineBreak = e.inputType === 'insertLineBreak';
                    const newlineAdded = (letterContent.match(/\n/g) || []).length > (lastSentValue.match(/\n/g) || []).length;

                    if (!skipNextInputBell && (insertedLineBreak || newlineAdded)) {
                        peer.send('__BELL__');
                    }

                    peer.send(letterContent);
                    lastSentValue = letterContent;
                    skipNextInputBell = false;

                    if (getCurrentLineLength(letterContent) === MAX_CHARS_PER_LINE) {
                        showLineGuide('Line full. Swipe the carriage to start a new line.');
                    }
                } else {
                    console.log('Peer not connected yet');
                }
            });

            // Detect Enter key and send bell signal
            $letterInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    triggerCarriageReturn();
                    return;
                }

                const currentLineLength = getCurrentLineLength($letterInput.value);
                const lineIsFull = currentLineLength >= MAX_CHARS_PER_LINE && !$letterInput.value.endsWith('\n');

                if (lineIsFull && isCharacterInsertionKey(e)) {
                    e.preventDefault();
                    showLineGuide('Line full. Swipe the carriage to start a new line.');
                    return;
                }
            });

            // Send sticker when heart is clicked
            document.querySelector('.heart-icon').addEventListener('click', () => {
                if (peer && peer.connected) {
                    peer.send('__STICKER__');
                    console.log('Sticker sent!');
                } else {
                    console.log('Peer not connected yet');
                }
            });

            $typingSurface.addEventListener('click', focusHiddenInput);
            $typingSurface.addEventListener('touchstart', focusHiddenInput, { passive: true });
            $typingSurface.addEventListener('touchstart', (e) => {
                if (!e.touches || e.touches.length === 0) {
                    return;
                }

                swipeStartX = e.touches[0].clientX;
                swipeStartY = e.touches[0].clientY;
            }, { passive: true });

            $typingSurface.addEventListener('touchend', (e) => {
                if (!e.changedTouches || e.changedTouches.length === 0) {
                    return;
                }

                const touch = e.changedTouches[0];
                const deltaX = touch.clientX - swipeStartX;
                const deltaY = Math.abs(touch.clientY - swipeStartY);

                if (Math.abs(deltaX) >= SWIPE_THRESHOLD && deltaY <= SWIPE_VERTICAL_TOLERANCE) {
                    triggerCarriageReturn();
                }
            }, { passive: true });
            $typingSurface.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    focusHiddenInput();
                }
            });

            init();
        }

    </script>

</body>

</html>
