<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typewriter application</title>
    <link rel="stylesheet" href="https://use.typekit.net/njf0vdi.css">
    <link rel="stylesheet" href="remote.css">
</head>

<body>
    <div class="container">
        <h1>Type your letter here</h1>
        <div id="status">Connecting...</div>
        <div class="seal-actions" id="sealActions" hidden>
            <span class="seal-message">Your letter is sealed and stamped.</span>
            <button class="save-letter-btn" id="saveLetterBtn" type="button" hidden>Save my letter</button>
        </div>
        <div class="top-controls">
            <div class="ink-color-selector">
                <div>ink color</div>
                <div class="color-ball"></div>
            </div>
            <div class="done-bar">
                <div>stamp</div>
                <button class="done-envelope-btn" id="doneBtn" aria-label="Done">
                    <img src="images/stamp.png" alt="Done">
                </button>
            </div>
            <div class="sticker-selector">
                <div>sticker</div>
                <img src="images/heart.png" alt="heart" class="heart-icon">
            </div>
        </div>
        <div class="paper-playground" id="paperPlayground">
            <div class="paper-sheet" id="paperSheet" role="button" tabindex="0"
                aria-label="Drag this paper to the trash"><span class="paper-label">empty paper</span></div>
            <div class="trash-bin" id="trashBin" aria-hidden="true">🗑️</div>
        </div>
        <div class="paper-hint">Drag the paper to the trash to restart.</div>
        <div class="typing-surface" id="typingSurface" role="button" tabindex="0" aria-label="Tap here to type">
            <p>Start typing here..</p>
            <p class="swipe-hint">Swipe left ←<span class="typing-caret"></span></p>
        </div>
        <div class="line-guide" id="lineGuide">Swipe left or flick phone left to return carriage.</div>
        <div class="motion-bar" id="motionBar">
            <button class="motion-btn" id="motionBtn">Enable motion sensor</button>
            <span class="motion-status" id="motionStatus"></span>
        </div>
        <textarea id="letterInput" autocomplete="off" autocorrect="off" autocapitalize="on"
            spellcheck="false"></textarea>
    </div>
    <audio id="stampSound" src="audio/stamp.mp3" preload="auto"></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="remote.js"></script>
</body>

</html>
