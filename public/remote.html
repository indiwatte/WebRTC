<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typewriter application</title>
</head>

<body>
    <p><a href="#" id="remoteUrl">open remote</a></p>


    <form id="nameForm">
        <input id="nameInput" type="text" name="nameInput" placeholder="Enter your name" />
        <button type="submit">Set Name</button>
    </form>
    <form id="msgForm">
        <input id="msgInput" type="text" name="msgInput" placeholder="Type a message" />
        <button type="submit">Send Message</button>
    </form>

    <textarea name="messages" id="messages"></textarea>
    <script src="/socket.io/socket.io.js"></script>

    <script>


        {
            const $remoteUrl = document.getElementById('remoteUrl');
            const $msgForm = document.getElementById('msgForm');
            const $msgInput = document.getElementById('msgInput');
            const $messages = document.getElementById('messages');

            const $nameInput = document.getElementById('nameInput');
            const $nameForm = document.getElementById('nameForm');

            let socket;
            let targetSocketId;
            let socketIds = [];

            const getUrlParameter = name => {
                name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
                const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
                const results = regex.exec(location.search);
                return results === null ? false : decodeURIComponent(results[1].replace(/\+/g, ' '));
            };

            const init = () => {
                targetSocketId = getUrlParameter('targetSocketId');
                console.log('Target Socket ID:', targetSocketId);

                socket = io.connect('/');
                socket.on('connect', () => {
                    console.log(`Connected to server: ${socket.id}`);
                    $remoteUrl.textContent = socket.id;
                    $remoteUrl.setAttribute('href', 'http://localhost/remote.html?targetSocketId=' + socket.id);
                });


                socket.on('message', (client, message) => {
                    console.log(`Received message: ${message}`);
                    console.log(client);
                    $messages.value += `${client.name} says: ${message}\n`;
                });

                socket.on('nameError', error => {
                    alert(error);
                });

                socket.on('messageError', error => {
                    alert(error);
                });

                socket.on('name', client => {
                    alert(`Name set to: ${client.name}`);
                });

                socket.on('clientList', clients => {
                    console.log('Available clients:', clients);
                });

                socket.on('update', (client, data) => {
                    console.log('Received update from:', client, 'Data:', data);
                });

                $msgForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    socket.emit('message', $msgInput.value);
                    $msgInput.value = '';
                });

                $nameForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    socket.emit('name', $nameInput.value);
                    $nameInput.value = '';
                });
            };
            init();
        }

    </script>

</body>

</html>
