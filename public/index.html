<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typewriter application</title>
    <link rel="icon" type="image/png" href="images/T.png">
    <link rel="stylesheet" href="https://use.typekit.net/njf0vdi.css">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="start-screen" id="startScreen">
        <p class="start-screen-label">tap to begin</p>
    </div>

    <section class="intro-screen" id="introScreen">
        <button id="skipIntroBtn" class="skip-intro-btn">Skip intro</button>
        <p class="intro-quote" id="introQuote"></p>
        <div class="intro-qr-wrap" id="introQrWrap">
            <p class="intro-instruction">Open the letter and scan to start writing your own letter</p>
                        <p class="intro-instruction">Turn on your sound for the full experience.</p>
            <div class="qr-stage">
                <a href="#" id="remoteUrl">Preparing QR code...</a>
                <div class="qr-envelope" aria-hidden="true">
                    <img src="./images/enveloppe.png" alt="envelope image" class="qr-envelope-svg">
                </div>
            </div>
        </div>
    </section>

    <div class="main-ui" id="mainUi">
        <div class="container">
            <h1>Dear you...</h1>
            <h2>A digital letter note machine</h2>
            <div class="paper-stack" id="paperStack">
                <textarea id="letterDisplay" readonly placeholder="Waiting for connection..."></textarea>
                <img id="letterSealFlap" src="images/enveloppe.png" alt="" aria-hidden="true">
                <img id="letterStamp" src="images/stamp.png" alt="" aria-hidden="true">
                <div id="paperCrumpleFx" aria-hidden="true"></div>
            </div>
            <div class="typing-eyes" id="typingEyes" aria-hidden="true"></div>
            <div class="typewriter-wrap">
                <img class="typewriter-base" src="images/typewriter-part1.png" alt="typewriter body">
                <img class="typewriter-carriage" src="images/typewriter-part2.png" alt="typewriter carriage">
            </div>
            <p class="desktop-footer">Indi Watté ® 2026</p>
        </div>
    </div>
    <audio id="sentenceSound" src="audio/sentence.mp3" preload="auto"></audio>
    <audio id="typewriterSound" src="audio/typesound.mp3" preload="auto"></audio>
    <audio id="bellSound" src="audio/bell.mp3" preload="auto"></audio>
    <audio id="crumpleSound" src="audio/crumlingpaper.mp3" preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="index.js"></script>
</body>

</html>
